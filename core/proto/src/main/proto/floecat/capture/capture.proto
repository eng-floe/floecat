syntax = "proto3";

package ai.floedb.floecat.capture;

option java_multiple_files = true;
option java_package = "ai.floedb.floecat.capture.rpc";
option java_outer_classname = "CaptureProto";

enum CaptureOutput {
  CO_UNSPECIFIED = 0;
  CO_TABLE_STATS = 1;
  CO_FILE_STATS = 2;
  CO_COLUMN_STATS = 3;
  CO_PARQUET_PAGE_INDEX = 4;
}

message CaptureColumnPolicy {
  string selector = 1;
  bool capture_stats = 2;
  bool capture_index = 3;
}

enum DefaultColumnScope {
  DCS_UNSPECIFIED = 0;
  DCS_FIRST_N = 1;
  DCS_ALL = 2;
  DCS_EXPLICIT_ONLY = 3;
}

message CapturePolicy {
  repeated CaptureColumnPolicy columns = 1;
  repeated CaptureOutput outputs = 2;
  DefaultColumnScope default_column_scope = 3;
  uint32 max_default_columns = 4;
  // Generic key-value capture properties forwarded opaquely to the execution engine.
  // Floecat does not interpret these; the engine reads whatever keys it understands.
  // Example key shape: "stats.<engine-feature>.<parameter>".
  map<string, string> properties = 5;
}
