syntax = "proto3";
package ai.floedb.floecat.catalog;

option java_multiple_files = true;
option java_package = "ai.floedb.floecat.catalog.rpc";

import "floecat/common/common.proto";

enum ConstraintType {
  CT_UNSPECIFIED = 0;
  CT_PRIMARY_KEY = 1;
  CT_FOREIGN_KEY = 2;
  CT_UNIQUE = 3;
  CT_CHECK = 4;
  // Can be sourced from schema nullability and represented as a single-column constraint.
  // Encoding convention:
  // - exactly one local entry in `columns`
  // - `check_expression` unused
  // - `referenced_table_id`, `referenced_table_name`, and `referenced_columns` unused
  CT_NOT_NULL = 5;
}

enum ConstraintEnforcement {
  CE_UNSPECIFIED = 0;
  CE_ENFORCED = 1;
  CE_NOT_ENFORCED = 2;
}

message ConstraintColumnRef {
  // Stable column identifier when available.
  int64 column_id = 1;

  // Human-readable column name.
  string column_name = 2;

  // 1-based position within the containing constraint column list.
  // For FOREIGN KEY this applies independently to local `columns` and `referenced_columns`.
  int32 ordinal = 3;
}

// ConstraintDefinition supports both table constraints and column-level constraints
// (for example NOT NULL derived from schema nullability).
message ConstraintDefinition {
  // Constraint name (may be blank for unnamed constraints).
  string name = 1;

  // Expected field usage by type (not proto-enforced):
  // - CT_PRIMARY_KEY / CT_UNIQUE: populate `columns`; leave `referenced_*` unset.
  // - CT_FOREIGN_KEY: populate `columns` and `referenced_columns`; usually set
  //   `referenced_table_id` (and optionally `referenced_table_name`).
  // - CT_CHECK: populate `check_expression`; leave `referenced_*` unset.
  // - CT_NOT_NULL: populate exactly one local `columns` entry; leave
  //   `check_expression` and `referenced_*` unset.
  ConstraintType type = 2;

  // Constrained local columns (ordered).
  repeated ConstraintColumnRef columns = 3;

  // Canonical SQL expression for CHECK constraints.
  string check_expression = 4;

  // Referenced table identity for FOREIGN KEY constraints.
  ai.floedb.floecat.common.ResourceId referenced_table_id = 5;

  // Human-readable referenced table name (optional).
  string referenced_table_name = 6;

  // Referenced columns for FOREIGN KEY constraints (ordered).
  repeated ConstraintColumnRef referenced_columns = 7;

  ConstraintEnforcement enforcement = 8;

  map<string, string> properties = 99;
}

// Snapshot-scoped, table-addressed constraint bundle.
// Storage identity is (table_id, snapshot_id), while the contained entries may mix:
// - table constraints (PRIMARY KEY, FOREIGN KEY, UNIQUE, CHECK)
// - column constraints represented in table scope (for example NOT NULL)
message SnapshotConstraints {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  repeated ConstraintDefinition constraints = 3;
  map<string, string> properties = 99;
}
