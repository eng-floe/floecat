syntax = "proto3";
package ai.floedb.floecat.catalog;

option java_multiple_files = true;
option java_package = "ai.floedb.floecat.catalog.rpc";

import "floecat/common/common.proto";
import "floecat/catalog/table.proto";

import "google/protobuf/timestamp.proto";

// Upstream provenance stamp for a value captured from metadata or compute.
message UpstreamStamp {
  TableFormat system = 1;
  string table_native_id = 2;
  string commit_ref = 3;
  google.protobuf.Timestamp fetched_at = 4;
  map<string,string> properties = 99;
}

// Number-of-distinct-values payload supporting exact and approximate representations.
message Ndv {
  oneof mode {
    int64 exact = 1;
    NdvApprox approx = 2;
  }

  repeated NdvSketch sketches = 20;
}

// Approximate NDV estimate plus confidence and sampling diagnostics.
message NdvApprox {
  double estimate = 1;
  double relative_standard_error = 2;
  double confidence_lower = 3;
  double confidence_upper = 4;
  double confidence_level = 5;
  uint64 rows_seen = 10;
  uint64 rows_total = 11;
  string method = 20;
  map<string,string> properties = 99;
}

// Serialized NDV sketch artifact used for replay/diagnostics.
message NdvSketch {
  string type = 1;
  bytes data = 2;
  string encoding = 3;
  string compression = 4;
  uint32 version = 5;
  map<string,string> properties = 99;
}

enum StatsProducer {
  // Unknown producer.
  SPROD_UNSPECIFIED = 0;
  // Read directly from source-native statistics exposed by the upstream system.
  SPROD_SOURCE_NATIVE = 1;
  // Derived from upstream metadata structures (for example manifests/logs), not direct value scans.
  SPROD_UPSTREAM_METADATA_DERIVED = 2;
  // Computed by an engine/runtime managed by this deployment.
  SPROD_ENGINE_COMPUTED = 3;
}

enum StatsCaptureMode {
  // Unknown capture mode.
  SCM_UNSPECIFIED = 0;
  // Captured on synchronous request path.
  SCM_SYNC = 1;
  // Captured on asynchronous/background reconcile path.
  SCM_ASYNC = 2;
}

enum StatsCompleteness {
  SC_UNSPECIFIED = 0;
  SC_COMPLETE = 1;
  SC_PARTIAL = 2;
  SC_UNAVAILABLE = 3;
}

message StatsCoverage {
  optional int64 rows_scanned = 1;
  optional int64 files_scanned = 2;
  optional int64 row_groups_sampled = 3;
  optional int64 bytes_scanned = 4;
  map<string,string> properties = 99;
}

message StatsMetadata {
  // Producer that generated this statistic value.
  StatsProducer producer = 1;
  // Completeness classification for planner/service quality decisions.
  StatsCompleteness completeness = 2;
  // Optional confidence in [0,1]. When absent, confidence is unknown.
  optional double confidence_level = 3;
  // Optional scan/sample coverage diagnostics describing how this stat was produced.
  // Absence is valid and expected when no sampling/scan telemetry is available.
  StatsCoverage coverage = 4;
  // Optional time the statistic payload was captured from compute/metadata source.
  // Absence is valid when the provider cannot determine capture time.
  google.protobuf.Timestamp captured_at = 5;
  // Optional time this record was last refreshed in Floecat (may differ from captured_at).
  // Absence is valid when refresh time is not tracked.
  google.protobuf.Timestamp refreshed_at = 6;
  // Whether this statistic entered Floecat via sync or async capture flow.
  StatsCaptureMode capture_mode = 7;
  map<string,string> properties = 99;
}

// ---------- Generalized stats targets ----------

// Table-wide target identity (single record per table/snapshot).
message TableStatsTarget {}

message ColumnStatsTarget {
  // Stable column_id from table schema metadata.
  int64 column_id = 1;
}

message EngineExpressionStatsTarget {
  // Engine scope for this expression key (for example: trino, spark, duckdb).
  string engine_kind = 1;
  // Engine-owned opaque expression identity bytes. Floecat stores and matches this value as-is.
  bytes engine_expression_key = 2;
  // Optional producer version for observability.
  // Not part of target identity so statistics persist across engine version upgrades.
  string engine_version = 3;
  map<string,string> properties = 99;
}

message FileStatsTarget {
  // Canonical file path identity within a snapshot.
  string file_path = 1;
}

message StatsTarget {
  oneof target {
    TableStatsTarget table = 1;
    ColumnStatsTarget column = 2;
    EngineExpressionStatsTarget expression = 3;
    FileStatsTarget file = 4;
  }
}

enum StatsTargetKind {
  STK_UNSPECIFIED = 0;
  STK_TABLE = 1;
  STK_COLUMN = 2;
  STK_EXPRESSION = 3;
  STK_FILE = 4;
}

// Persisted target-scoped stats envelope keyed by (table_id, snapshot_id, target).
message TargetStatsRecord {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  StatsTarget target = 3;
  // Canonical metadata envelope for all target kinds.
  StatsMetadata metadata = 4;
  // value holds the statistics payload for this record.
  // Expression targets (StatsTarget.expression) store their statistics as scalar values.
  // There is no dedicated expression value payload type.
  oneof value {
    TableValueStats table = 10;
    ScalarStats scalar = 11;
    FileTargetStats file = 12;
  }
  map<string, string> properties = 99;
}

message TableValueStats {
  UpstreamStamp upstream = 1;
  int64 row_count = 2;
  int64 data_file_count = 3;
  int64 total_size_bytes = 4;
  map<string, string> properties = 99;
}

// ---------- Scalar value stats ----------

message ScalarStats {
  // Optional presentation label for this scalar target (column name, alias, etc.).
  // This field is cosmetic only and MUST NOT be used for identity, routing, or storage keys.
  string display_name = 1;
  string logical_type = 2;
  UpstreamStamp upstream = 3;
  int64 value_count = 4;
  optional int64 null_count = 5;
  optional int64 nan_count = 6;
  Ndv ndv = 7;
  optional string min = 8;
  optional string max = 9;
  bytes histogram = 10;
  bytes tdigest = 11;
  map<string, string> properties = 99;
}

// Per-column stats entry within a file-level record.
// Pairs stable column identity with its scalar statistics payload.
message FileColumnStats {
  int64 column_id = 1;
  ScalarStats scalar = 2;
}

// ---------- File-level stats ------------

message FileTargetStats {
  // Redundant with enclosing TargetStatsRecord.table_id. Kept for standalone deserialization.
  ai.floedb.floecat.common.ResourceId table_id = 1;
  // Redundant with enclosing TargetStatsRecord.snapshot_id. Kept for standalone deserialization.
  int64 snapshot_id = 2;
  string file_path = 3;
  string file_format = 4;
  int64 row_count = 5;
  int64 size_bytes = 6;
  repeated FileColumnStats columns = 7;
  FileContent file_content = 8;
  string partition_data_json = 9;
  int32 partition_spec_id = 10;
  repeated int32 equality_field_ids = 11;
  optional int64 sequence_number = 12;
}

enum FileContent {
  FC_UNSPECIFIED = 0;
  FC_DATA = 1;
  FC_POSITION_DELETES = 2;
  FC_EQUALITY_DELETES = 3;
}

// ---------- Requests/Responses ----------

message PutTargetStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  // Stats writes are accepted even when snapshot_id is not yet materialized.
  // The service currently treats stats as create-only per (table_id, snapshot_id, target).
  int64 snapshot_id = 2;
  repeated TargetStatsRecord records = 3;
  ai.floedb.floecat.common.IdempotencyKey idempotency = 4;
}
message PutTargetStatsResponse {
  int32 upserted = 1;
}

message GetTargetStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  ai.floedb.floecat.common.SnapshotRef snapshot = 2;
  StatsTarget target = 3;
}
message GetTargetStatsResponse {
  TargetStatsRecord stats = 1;
}

message ListTargetStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  ai.floedb.floecat.common.SnapshotRef snapshot = 2;
  ai.floedb.floecat.common.PageRequest page = 3;
  // At most one kind per request is currently supported.
  // Multi-kind filtering is reserved for future use.
  repeated StatsTargetKind target_kinds = 4;
}
message ListTargetStatsResponse {
  repeated TargetStatsRecord records = 1;
  ai.floedb.floecat.common.PageResponse page = 2;
}

// ---------- Services ----------

service TableStatisticsService {
  rpc GetTargetStats(GetTargetStatsRequest) returns (GetTargetStatsResponse);
  rpc ListTargetStats(ListTargetStatsRequest) returns (ListTargetStatsResponse);
  rpc PutTargetStats(stream PutTargetStatsRequest) returns (PutTargetStatsResponse);
}
