syntax = "proto3";
package ai.floedb.floecat.catalog;

option java_multiple_files = true;
option java_package = "ai.floedb.floecat.catalog.rpc";

import "floecat/common/common.proto";
import "floecat/catalog/table.proto";

import "google/protobuf/timestamp.proto";

message UpstreamStamp {
  TableFormat system = 1;
  string table_native_id = 2;
  string commit_ref = 3;
  google.protobuf.Timestamp fetched_at = 4;
  map<string,string> properties = 99;
}

message Ndv {
  oneof mode {
    int64 exact = 1;
    NdvApprox approx = 2;
  }

  repeated NdvSketch sketches = 20;
}

message NdvApprox {
  double estimate = 1;
  double relative_standard_error = 2;
  double confidence_lower = 3;
  double confidence_upper = 4;
  double confidence_level = 5;
  uint64 rows_seen = 10;
  uint64 rows_total = 11;
  string method = 20;
  map<string,string> properties = 99;
}

message NdvSketch {
  string type = 1;
  bytes data = 2;
  string encoding = 3;
  string compression = 4;
  uint32 version = 5;
  map<string,string> properties = 99;
}

enum StatsProducer {
  // Unknown producer.
  SPROD_UNSPECIFIED = 0;
  // Read directly from source-native statistics exposed by the upstream system.
  SPROD_SOURCE_NATIVE = 1;
  // Derived from upstream metadata structures (for example manifests/logs), not direct value scans.
  SPROD_UPSTREAM_METADATA_DERIVED = 2;
  // Computed by an engine/runtime managed by this deployment.
  SPROD_ENGINE_COMPUTED = 3;
}

enum StatsCaptureMode {
  // Unknown capture mode.
  SCM_UNSPECIFIED = 0;
  // Captured on synchronous request path.
  SCM_SYNC = 1;
  // Captured on asynchronous/background reconcile path.
  SCM_ASYNC = 2;
}

enum StatsCompleteness {
  SC_UNSPECIFIED = 0;
  SC_COMPLETE = 1;
  SC_PARTIAL = 2;
  SC_UNAVAILABLE = 3;
}

message StatsCoverage {
  optional int64 rows_scanned = 1;
  optional int64 files_scanned = 2;
  optional int64 row_groups_sampled = 3;
  optional int64 bytes_scanned = 4;
  map<string,string> properties = 99;
}

message StatsMetadata {
  // Producer that generated this statistic value.
  StatsProducer producer = 1;
  // Completeness classification for planner/service quality decisions.
  StatsCompleteness completeness = 2;
  // Optional confidence in [0,1]. When absent, confidence is unknown.
  optional double confidence_level = 3;
  // Optional scan/sample coverage diagnostics describing how this stat was produced.
  // Absence is valid and expected when no sampling/scan telemetry is available.
  StatsCoverage coverage = 4;
  // Optional time the statistic payload was captured from compute/metadata source.
  // Absence is valid when the provider cannot determine capture time.
  google.protobuf.Timestamp captured_at = 5;
  // Optional time this record was last refreshed in Floecat (may differ from captured_at).
  // Absence is valid when refresh time is not tracked.
  google.protobuf.Timestamp refreshed_at = 6;
  // Whether this statistic entered Floecat via sync or async capture flow.
  StatsCaptureMode capture_mode = 7;
  map<string,string> properties = 99;
}

// ---------- Generalized stats targets ----------

message TableStatsTarget {}

message ColumnStatsTarget {
  // Stable column_id from table schema metadata.
  int64 column_id = 1;
}

message EngineExpressionStatsTarget {
  // Engine scope for this expression key (for example: trino, spark, duckdb).
  string engine_kind = 1;
  // Engine-owned opaque expression identity bytes. Floecat stores and matches this value as-is.
  bytes engine_expression_key = 2;
  // Optional producer version for observability. Not part of target identity.
  string engine_version = 3;
  map<string,string> properties = 99;
}

message StatsTarget {
  oneof target {
    TableStatsTarget table = 1;
    ColumnStatsTarget column = 2;
    EngineExpressionStatsTarget expression = 3;
  }
}

// ---------- Table-level stats ----------

message TableStats {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  UpstreamStamp upstream = 3;
  int64 row_count = 10;
  int64 data_file_count = 11;
  int64 total_size_bytes = 12;
  Ndv ndv = 20;
  StatsMetadata metadata = 30;
  map<string, string> properties = 99;
}

// ---------- Column-level stats  ----------

message ColumnStats {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  int64 column_id = 3;
  string column_name = 4;
  string logical_type = 5;
  UpstreamStamp upstream = 6;
  int64 value_count = 9;
  optional int64 null_count = 10;
  optional int64 nan_count = 11;
  
  /**
   * NDV summary; callers MUST check {@code hasNdv()} before using this field.
   * When the field is absent, NDV is unknown and should not be inferred.
   * When present, {@code mode} controls interpretation:
   *   - mode unset → NDV unknown (avoid inferring from other data).
   *   - approx → honor {@code NdvApprox.estimate} and ignore sketches unless you understand them.
   *   - exact → use {@code Ndv.exact}.
   * Sketches can be left unset unless the connector knows how to decode them.
   */
  Ndv ndv = 12;
  
  /**
   * Optional, canonical UTF-8 bound; presence indicates it was computed even if empty.
   * See docs/connectors-spi.md#column-bounds-encoding for the per-type encoding rules.
   */
  optional string min = 20;
  
  /**
   * Max follows the same canonical encoding rules as {@code min}.
   */
  optional string max = 21;
  bytes histogram = 30;
  bytes tdigest = 31;
  StatsMetadata metadata = 40;
  map<string, string> properties = 99;
}

// ---------- File-level stats ------------

message FileColumnStats {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  string file_path = 3;
  string file_format = 4;
  int64 row_count = 5;
  int64 size_bytes = 6;
  repeated ColumnStats columns = 7;
  FileContent file_content = 8;
  string partition_data_json = 9;
  int32 partition_spec_id = 10;
  repeated int32 equality_field_ids = 11;
  optional int64 sequence_number = 12;
}

enum FileContent {
  FC_UNSPECIFIED = 0;
  FC_DATA = 1;
  FC_POSITION_DELETES = 2;
  FC_EQUALITY_DELETES = 3;
}

// ---------- Requests/Responses ----------

message PutTableStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  // Stats writes are accepted even when snapshot_id is not yet materialized.
  // The service currently treats stats as create-only per (table_id, snapshot_id).
  int64 snapshot_id = 2;
  TableStats stats = 3;
  ai.floedb.floecat.common.IdempotencyKey idempotency = 4;
}
message PutTableStatsResponse {
  TableStats stats = 1;
  ai.floedb.floecat.common.MutationMeta meta = 2;
}

message PutColumnStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  repeated ColumnStats columns = 3;
  ai.floedb.floecat.common.IdempotencyKey idempotency = 4;
}
message PutColumnStatsResponse {
  int32 upserted = 1;
}

message PutFileColumnStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  repeated FileColumnStats files = 3;
  ai.floedb.floecat.common.IdempotencyKey idempotency = 4;
}
message PutFileColumnStatsResponse {
  int32 upserted = 1;
}

message GetTableStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  ai.floedb.floecat.common.SnapshotRef snapshot = 2;
  ai.floedb.floecat.common.PageRequest page = 3;
}
message GetTableStatsResponse {
  TableStats stats = 1;
  ai.floedb.floecat.common.PageResponse page = 2;
}

message ListColumnStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  ai.floedb.floecat.common.SnapshotRef snapshot = 2;
  ai.floedb.floecat.common.PageRequest page = 3;
}
message ListColumnStatsResponse {
  repeated ColumnStats columns = 1;
  ai.floedb.floecat.common.PageResponse page = 2;
}

message ListFileColumnStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  ai.floedb.floecat.common.SnapshotRef snapshot = 2;
  ai.floedb.floecat.common.PageRequest page = 3;
}
message ListFileColumnStatsResponse {
  repeated FileColumnStats file_columns = 1;
  ai.floedb.floecat.common.PageResponse page = 2;
}

// ---------- Services ----------

service TableStatisticsService {
  rpc GetTableStats(GetTableStatsRequest) returns (GetTableStatsResponse);
  rpc ListColumnStats(ListColumnStatsRequest) returns (ListColumnStatsResponse);
  rpc ListFileColumnStats(ListFileColumnStatsRequest) returns (ListFileColumnStatsResponse);
  rpc PutTableStats(PutTableStatsRequest) returns (PutTableStatsResponse);
  rpc PutColumnStats(stream PutColumnStatsRequest)
      returns (PutColumnStatsResponse);
  rpc PutFileColumnStats(stream PutFileColumnStatsRequest)
      returns (PutFileColumnStatsResponse);
}
