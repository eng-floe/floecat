syntax = "proto3";

package ai.floedb.floecat.query;

option java_multiple_files = true;
option java_package = "ai.floedb.floecat.query.rpc";
option java_outer_classname = "PlannerStatsProto";

import "floecat/catalog/stats.proto";
import "floecat/catalog/constraints.proto";
import "floecat/common/common.proto";

// ---------- Planner stats API (target stats fetch) ----------
service PlannerStatsService {
  /**
   * GetTargetStats returns stats for specific targets the planner decided it needs.
   *
   * The server resolves snapshot semantics using query_id pins when available.
   * Strict semantics are enforced: each table_id must have an active pin in the QueryContext,
   * and stats are read only at that pinned snapshot for the requested target identities.
   * Duplicate targets are deduped and the request is bounded by server-side table/target limits.
   *
   * Failure codes reported inside TargetStatsResult.failure.code:
   *   planner_stats.pin.missing – the QueryContext lacks a pin for the requested table.
   *   planner_stats.target_stats.missing – stats were not found for the pinned snapshot/target.
   *   planner_stats.target_stats.error – an unexpected repository failure occurred while reading stats.
   */
  rpc GetTargetStats(FetchTargetStatsRequest) returns (stream TargetStatsBundleChunk);

  /**
   * GetTableConstraints returns table-scoped constraints for planner-selected relations.
   *
   * GetTableConstraints provides a dedicated constraints stream for planner clients that fetch
   * constraints separately. GetTargetStats(include_constraints=true) remains available for clients
   * that prefer combined retrieval in one roundtrip.
   *
   * Visibility semantics are request-scoped at relation level: results may be pruned/redacted
   * by requested tables (for example, foreign keys to non-requested tables are hidden).
   *
   * Unlike GetTargetStats(include_constraints=true), this request does not carry target
   * projection context, so column-level pruning/masking cannot be made projection-aware here.
   */
  rpc GetTableConstraints(FetchTableConstraintsRequest) returns (stream TableConstraintsBundleChunk);
}

/** Request stats for a set of targets across one or more relations. */
message FetchTargetStatsRequest {
  /** Query ID obtained from BeginQuery (and used for snapshot pins). */
  string query_id = 1;

  /** Which targets the planner needs stats for. */
  repeated TableTargetStatsRequest tables = 2;

  /**
   * When true, include table-scoped constraint bundles for requested tables.
   * Bundles are keyed by (table_id, snapshot_id) and may include both table and
   * column-level constraints (for example NOT NULL).
   *
   * Defaults to false to preserve existing capture-only behavior for older clients.
   */
  bool include_constraints = 3;
}

/** Request table-scoped constraints for one or more relations. */
message FetchTableConstraintsRequest {
  /** Query ID obtained from BeginQuery (and used for snapshot pins). */
  string query_id = 1;

  /**
   * Table IDs the planner needs constraints for. Duplicates are deduped server-side.
   *
   * This request is relation-scoped and does not include requested column IDs.
   */
  repeated ai.floedb.floecat.common.ResourceId table_ids = 2;
}

/** Targets requested for one table. */
message TableTargetStatsRequest {
  ai.floedb.floecat.common.ResourceId table_id = 1;

  /**
   * Target identities to resolve for this table. Duplicates are deduped server-side.
   * For column targets, column_id must be positive.
   */
  repeated ai.floedb.floecat.catalog.StatsTarget targets = 2;
}

/** Streamed chunk for target stats bundles. */
message TargetStatsBundleChunk {
  string query_id = 1;
  uint64 seq = 2;

  oneof payload {
    TargetStatsBundleHeader header = 10;
    TargetStatsBatch batch = 20;
    TargetStatsBundleEnd end = 90;
  }
}

/** Streamed chunk for table constraints bundles. */
message TableConstraintsBundleChunk {
  string query_id = 1;
  uint64 seq = 2;

  oneof payload {
    TableConstraintsBundleHeader header = 10;
    TableConstraintsBatch batch = 20;
    TableConstraintsBundleEnd end = 90;
  }
}

message TargetStatsBundleHeader {}
message TableConstraintsBundleHeader {}

message TargetStatsBundleEnd {
  uint64 requested_tables = 1;
  uint64 requested_targets = 2;
  uint64 returned_targets = 3;
  uint64 not_found_targets = 4;
  uint64 error_targets = 5;
}

message TableConstraintsBundleEnd {
  uint64 requested_tables = 1;
  uint64 returned_tables = 2;
  uint64 not_found_tables = 3;
  uint64 error_tables = 4;
}

message StatsWarning {
  string code = 1;
  string message = 2;
  map<string,string> details = 10;
}

/** Batch of target stats results. */
message TargetStatsBatch {
  repeated TargetStatsResult targets = 1;
  repeated StatsWarning warnings = 2;

  /**
   * Optional table-scoped constraint bundles.
   * Each result is addressed by table id, and the contained definitions may mix table
   * and column-level constraints.
   *
   * Emitted only when requested via FetchTargetStatsRequest.include_constraints.
   */
  repeated TableConstraintsResult constraints = 3;
}

/** Batch of table constraints results. */
message TableConstraintsBatch {
  repeated TableConstraintsResult constraints = 1;
  // Reserved for future constraint warning signals (none are currently emitted).
  repeated StatsWarning warnings = 2;
}

enum BundleResultStatus {
  BUNDLE_RESULT_STATUS_UNSPECIFIED = 0;
  BUNDLE_RESULT_STATUS_FOUND = 1;
  BUNDLE_RESULT_STATUS_NOT_FOUND = 2;
  BUNDLE_RESULT_STATUS_ERROR = 3;
}

message TargetStatsResult {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  int64 snapshot_id = 2;
  ai.floedb.floecat.catalog.StatsTarget target = 3;

  BundleResultStatus status = 4;

  /** Present when status == FOUND. */
  ai.floedb.floecat.catalog.TargetStatsRecord stats = 10;

  /** Present when status != FOUND. */
  BundleFailure failure = 11;
}

/** Constraint bundle payload for one table. */
message TableConstraintsResult {
  ai.floedb.floecat.common.ResourceId table_id = 1;
  BundleResultStatus status = 2;

  /** Present when status == FOUND. */
  repeated ai.floedb.floecat.catalog.ConstraintDefinition constraints = 10;

  /** Present when status != FOUND. */
  BundleFailure failure = 11;
}

/**
 * Planner-specific failure metadata. The server typically sets one of:
 *   planner_stats.pin.missing – reported with `status = BUNDLE_RESULT_STATUS_ERROR`
 *   planner_stats.target_stats.missing – reported with `status = BUNDLE_RESULT_STATUS_NOT_FOUND`
 *   planner_stats.target_stats.error – reported with `status = BUNDLE_RESULT_STATUS_ERROR`
 */
message BundleFailure {
  string code = 1;
  string message = 2;
  map<string,string> details = 10;
}
