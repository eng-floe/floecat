syntax = "proto3";
package ai.floedb.floecat.reconciler;
option java_multiple_files = true;
option java_package = "ai.floedb.floecat.reconciler.rpc";

import "floecat/common/common.proto";
import "floecat/connector/connector.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

message CaptureScope {
  ai.floedb.floecat.common.ResourceId connector_id = 1;
  repeated ai.floedb.floecat.connector.NamespacePath destination_namespace_paths = 2;
  string destination_table_display_name = 3;
  repeated string destination_table_columns = 4;
  repeated uint64 destination_snapshot_ids = 5;
}

enum CaptureMode {
  CM_UNSPECIFIED = 0;
  CM_METADATA_ONLY = 1;
  CM_METADATA_AND_STATS = 2;
  CM_STATS_ONLY = 3;
}

enum ExecutionClass {
  EC_UNSPECIFIED = 0;
  EC_DEFAULT = 1;
  EC_INTERACTIVE = 2;
  EC_BATCH = 3;
  EC_HEAVY = 4;
}

enum ReconcileJobKind {
  RJK_UNSPECIFIED = 0;
  RJK_EXEC_CONNECTOR = 1;
  RJK_PLAN_CONNECTOR = 2;
  RJK_EXEC_TABLE = 3;
}

message ReconcileTableTask {
  string source_namespace = 1;
  string source_table = 2;
  string destination_table_display_name = 3;
}

message ExecutionPolicy {
  ExecutionClass execution_class = 1;
  string lane = 2;
  map<string, string> attributes = 3;
}

message CaptureNowRequest {
  CaptureScope scope = 1;
  CaptureMode mode = 2;
  bool full_rescan = 3;
}

message CaptureNowResponse {
  uint64 tables_scanned = 1;
  uint64 tables_changed = 2;
  uint64 errors = 3;
}

message StartCaptureRequest {
  CaptureScope scope = 1;
  CaptureMode mode = 2;
  bool full_rescan = 3;
  ExecutionPolicy execution_policy = 4;
}

message StartCaptureResponse {
  string job_id = 1;
}

message LeasedReconcileJob {
  string job_id = 1;
  ai.floedb.floecat.common.ResourceId connector_id = 2;
  CaptureMode mode = 3;
  bool full_rescan = 4;
  CaptureScope scope = 5;
  string lease_epoch = 6;
  ExecutionPolicy execution_policy = 7;
  string pinned_executor_id = 8;
  string executor_id = 9;
  ReconcileJobKind kind = 10;
  ReconcileTableTask table_task = 11;
  string parent_job_id = 12;
}

message LeaseReconcileJobRequest {
  string executor_id = 1;
  repeated ExecutionClass execution_classes = 2;
  repeated string lanes = 3;
  repeated ReconcileJobKind job_kinds = 4;
}

message LeaseReconcileJobResponse {
  bool found = 1;
  LeasedReconcileJob job = 2;
}

message RenewReconcileLeaseRequest {
  string job_id = 1;
  string lease_epoch = 2;
}

message RenewReconcileLeaseResponse {
  bool renewed = 1;
  bool cancellation_requested = 2;
}

message StartLeasedReconcileJobRequest {
  string job_id = 1;
  string lease_epoch = 2;
  string executor_id = 3;
}

message StartLeasedReconcileJobResponse {}

message ReportReconcileProgressRequest {
  string job_id = 1;
  string lease_epoch = 2;
  uint64 tables_scanned = 3;
  uint64 tables_changed = 4;
  uint64 errors = 5;
  uint64 snapshots_processed = 6;
  uint64 stats_processed = 7;
  string message = 8;
}

message ReportReconcileProgressResponse {
  bool lease_valid = 1;
  bool cancellation_requested = 2;
}

enum ReconcileCompletionState {
  RCS_UNSPECIFIED = 0;
  RCS_SUCCEEDED = 1;
  RCS_FAILED = 2;
  RCS_CANCELLED = 3;
}

message CompleteLeasedReconcileJobRequest {
  string job_id = 1;
  string lease_epoch = 2;
  ReconcileCompletionState state = 3;
  uint64 tables_scanned = 4;
  uint64 tables_changed = 5;
  uint64 errors = 6;
  uint64 snapshots_processed = 7;
  uint64 stats_processed = 8;
  string message = 9;
}

message CompleteLeasedReconcileJobResponse {
  bool accepted = 1;
}

message GetReconcileCancellationRequest {
  string job_id = 1;
}

message GetReconcileCancellationResponse {
  bool cancellation_requested = 1;
}

message GetReconcileJobRequest {
  string job_id = 1;
}

message GetReconcileJobResponse {
  string job_id = 1;
  string connector_id = 2;
  JobState state = 3;
  string message = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp finished_at = 6;
  uint64 tables_scanned = 7;
  uint64 tables_changed = 8;
  uint64 errors = 9;
  bool full_rescan = 10;
  uint64 snapshots_processed = 11;
  uint64 stats_processed = 12;
  uint64 duration_ms = 13;
  ExecutionPolicy execution_policy = 14;
  string executor_id = 15;
  ReconcileJobKind kind = 16;
  string parent_job_id = 17;
  ReconcileTableTask table_task = 18;
}

message ListReconcileJobsRequest {
  ai.floedb.floecat.common.PageRequest page = 1;
  string connector_id = 2;
  repeated JobState states = 3;
}

message ListReconcileJobsResponse {
  repeated GetReconcileJobResponse jobs = 1;
  ai.floedb.floecat.common.PageResponse page = 2;
}

message CancelReconcileJobRequest {
  string job_id = 1;
  string reason = 2;
}

message CancelReconcileJobResponse {
  bool cancelled = 1;
  GetReconcileJobResponse job = 2;
}

enum JobState {
  JS_UNSPECIFIED = 0;
  JS_QUEUED = 1;
  JS_RUNNING = 2;
  JS_SUCCEEDED = 3;
  JS_FAILED = 4;
  JS_CANCELLING = 5;
  JS_CANCELLED = 6;
}

message GetReconcilerSettingsRequest {}

message GetReconcilerSettingsResponse {
  bool auto_enabled = 1;
  google.protobuf.Duration default_interval = 2;
  ai.floedb.floecat.connector.ReconcileMode default_mode = 3;
  google.protobuf.Duration finished_job_retention = 4;
}

message UpdateReconcilerSettingsRequest {
  optional bool auto_enabled = 1;
  optional google.protobuf.Duration default_interval = 2;
  optional ai.floedb.floecat.connector.ReconcileMode default_mode = 3;
  optional google.protobuf.Duration finished_job_retention = 4;
}

message UpdateReconcilerSettingsResponse {
  bool auto_enabled = 1;
  google.protobuf.Duration default_interval = 2;
  ai.floedb.floecat.connector.ReconcileMode default_mode = 3;
  google.protobuf.Duration finished_job_retention = 4;
}

service ReconcileControl {
  rpc CaptureNow(CaptureNowRequest) returns (CaptureNowResponse);
  rpc StartCapture(StartCaptureRequest) returns (StartCaptureResponse);
  rpc GetReconcileJob(GetReconcileJobRequest) returns (GetReconcileJobResponse);
  rpc ListReconcileJobs(ListReconcileJobsRequest) returns (ListReconcileJobsResponse);
  rpc CancelReconcileJob(CancelReconcileJobRequest) returns (CancelReconcileJobResponse);
  rpc GetReconcilerSettings(GetReconcilerSettingsRequest) returns (GetReconcilerSettingsResponse);
  rpc UpdateReconcilerSettings(UpdateReconcilerSettingsRequest)
      returns (UpdateReconcilerSettingsResponse);
}

service ReconcileExecutorControl {
  rpc LeaseReconcileJob(LeaseReconcileJobRequest) returns (LeaseReconcileJobResponse);
  rpc RenewReconcileLease(RenewReconcileLeaseRequest) returns (RenewReconcileLeaseResponse);
  rpc StartLeasedReconcileJob(StartLeasedReconcileJobRequest)
      returns (StartLeasedReconcileJobResponse);
  rpc ReportReconcileProgress(ReportReconcileProgressRequest)
      returns (ReportReconcileProgressResponse);
  rpc CompleteLeasedReconcileJob(CompleteLeasedReconcileJobRequest)
      returns (CompleteLeasedReconcileJobResponse);
  rpc GetReconcileCancellation(GetReconcileCancellationRequest)
      returns (GetReconcileCancellationResponse);
}
