services:
  service:
    image: ${FLOECAT_SERVICE_IMAGE:-floecat-service:local}
    pull_policy: ${FLOECAT_PULL_POLICY:-never}
    env_file:
      - ${FLOECAT_ENV_FILE:-./env.localstack}
    ports:
      - "${FLOECAT_SERVICE_PORT:-9100}:9100"
    environment:
      FLOECAT_HTTP_HOST: "0.0.0.0"
      FLOECAT_HTTP_PORT: "9100"
      JAVA_TOOL_OPTIONS: "--add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED"
    networks:
      - floecat
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ${HOME}/.aws:/home/jboss/.aws:ro

  executor:
    image: ${FLOECAT_SERVICE_IMAGE:-floecat-service:local}
    pull_policy: ${FLOECAT_PULL_POLICY:-never}
    env_file:
      - ${FLOECAT_ENV_FILE:-./env.localstack}
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE_EXECUTOR:-reconciler-executor}
      FLOECAT_GRPC_HOST: "service"
      FLOECAT_GRPC_PORT: "9100"
      FLOECAT_RECONCILER_SCHEDULER_ENABLED: "false"
      FLOECAT_RECONCILER_REMOTE_EXECUTOR_ENABLED: "true"
      FLOECAT_RECONCILER_DEFAULT_EXECUTOR_ENABLED: "true"
      FLOECAT_RECONCILER_BACKEND: "remote"
      FLOECAT_RECONCILER_AUTO_ENABLED: "false"
      JAVA_TOOL_OPTIONS: "--add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED"
    depends_on:
      - service
    profiles:
      - reconciler-executor
    networks:
      - floecat
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ${HOME}/.aws:/home/jboss/.aws:ro

  iceberg-rest:
    image: ${FLOECAT_ICEBERG_REST_IMAGE:-floecat-iceberg-rest:local}
    pull_policy: ${FLOECAT_PULL_POLICY:-never}
    env_file:
      - ${FLOECAT_ENV_FILE:-./env.localstack}
    ports:
      - "${FLOECAT_REST_HOST_PORT:-9200}:9200"
    environment:
      FLOECAT_REST_HOST: "0.0.0.0"
      FLOECAT_REST_PORT: "9200"
      FLOECAT_GRPC_HOST: "service"
      FLOECAT_GRPC_PORT: "9100"
      FLOECAT_UPSTREAM_TARGET: "service:9100"
      FLOECAT_GATEWAY_SELF_URI: "http://iceberg-rest:9200"
      ICEBERG_DEFAULT_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      ICEBERG_STORAGE_SCOPE: ${ICEBERG_STORAGE_SCOPE:-*}
      ICEBERG_STORAGE_TYPE: ${ICEBERG_STORAGE_TYPE:-s3}
      ICEBERG_STORAGE_KEY_ID: ${FLOECAT_STORAGE_AWS_ACCESS_KEY_ID:-${AWS_ACCESS_KEY_ID:-<access-id>}}
      ICEBERG_STORAGE_SECRET: ${FLOECAT_STORAGE_AWS_SECRET_ACCESS_KEY:-${AWS_SECRET_ACCESS_KEY:-<secret-key>}}
      ICEBERG_STORAGE_REGION: ${FLOECAT_STORAGE_AWS_REGION:-${AWS_REGION:-us-east-1}}
      FLOECAT_GATEWAY_METADATA_FILE_IO: ${FLOECAT_GATEWAY_METADATA_FILE_IO:-org.apache.iceberg.aws.s3.S3FileIO}
      FLOECAT_REST_LOG_COMMIT_TRAFFIC: ${FLOECAT_REST_LOG_COMMIT_TRAFFIC:-false}
      FLOECAT_REST_LOG_REQUEST_BODY: ${FLOECAT_REST_LOG_REQUEST_BODY:-false}
      AWS_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${FLOECAT_STORAGE_AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${FLOECAT_STORAGE_AWS_SECRET_ACCESS_KEY:-test}
      AWS_SESSION_TOKEN: ${FLOECAT_STORAGE_AWS_SESSION_TOKEN:-}
      AWS_PROFILE: ""
      AWS_SDK_LOAD_CONFIG: "1"
    depends_on:
      - service
    networks:
      - floecat
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ${HOME}/.aws:/home/jboss/.aws:ro

  cli:
    image: ${FLOECAT_CLI_IMAGE:-floecat-cli:local}
    pull_policy: ${FLOECAT_PULL_POLICY:-never}
    env_file:
      - ${FLOECAT_ENV_FILE:-./env.localstack}
    environment:
      FLOECAT_GRPC_HOST: "service"
      FLOECAT_GRPC_PORT: "9100"
    depends_on:
      - service
    stdin_open: true
    tty: true
    command: ["--host", "service", "--port", "9100"]
    networks:
      - floecat

  localstack:
    image: localstack/localstack:4.12
    pull_policy: if_not_present
    ports:
      - "${FLOECAT_LOCALSTACK_PORT:-4566}:4566"
    environment:
      SERVICES: "s3,dynamodb,secretsmanager,sts,iam"
      DEFAULT_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${FLOECAT_STORAGE_AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${FLOECAT_STORAGE_AWS_SECRET_ACCESS_KEY:-test}
      FLOECAT_STORAGE_AWS_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      FLOECAT_BLOB_S3_BUCKET: ${FLOECAT_BLOB_S3_BUCKET:-floecat-dev}
      FLOECAT_KV_TABLE: ${FLOECAT_KV_TABLE:-floecat_pointers}
    volumes:
      - ./localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh:ro
    profiles:
      - localstack
      - localstack-oidc
    networks:
      - floecat

  polaris:
    image: apache/polaris:latest
    pull_policy: if_not_present
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully
    ports:
      - "${FLOECAT_POLARIS_HOST_PORT:-8281}:8181"
      - "${FLOECAT_POLARIS_MGMT_HOST_PORT:-8282}:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_RETRIES: "5"
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_INITIAL_DELAY_IN_MS: "100"
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_DURATION_IN_MS: "5000"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-db:5432/POLARIS
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      POLARIS_REALM_CONTEXT_REALMS: POLARIS
      QUARKUS_OTEL_SDK_DISABLED: "true"
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      polaris.features."ALLOW_INSECURE_STORAGE_TYPES": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": "[\"FILE\",\"S3\",\"GCS\",\"AZURE\"]"
      polaris.readiness.ignore-severe-issues: "true"
      AWS_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${FLOECAT_STORAGE_AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${FLOECAT_STORAGE_AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${FLOECAT_STORAGE_AWS_SECRET_ACCESS_KEY:-test}
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ENDPOINT_URL_S3: http://localstack:4566
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    profiles:
      - polaris
    networks:
      - floecat

  polaris-db:
    image: postgres:18.2
    pull_policy: if_not_present
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: POLARIS
      POSTGRES_INITDB_ARGS: "--encoding UTF8 --data-checksums"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 2s
      retries: 15
    profiles:
      - polaris
    networks:
      - floecat

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    pull_policy: if_not_present
    depends_on:
      polaris-db:
        condition: service_healthy
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-db:5432/POLARIS
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    command:
      - "bootstrap"
      - "--realm=POLARIS"
      - "--credential=POLARIS,root,s3cr3t"
    profiles:
      - polaris
    networks:
      - floecat

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    pull_policy: if_not_present
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: ${KC_HOSTNAME:-host.docker.internal}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-${KEYCLOAK_PORT:-8080}}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realm-floecat.json:/opt/keycloak/data/import/realm-floecat.json:ro
    profiles:
      - keycloak
      - localstack-oidc
    networks:
      - floecat

  trino:
    image: trinodb/trino:479
    pull_policy: if_not_present
    ports:
      - "${FLOECAT_TRINO_HOST_PORT:-8081}:8080"
    depends_on:
      - iceberg-rest
      - localstack
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    profiles:
      - trino
    networks:
      - floecat

  unity:
    image: ${FLOECAT_UNITY_IMAGE:-unitycatalog/unitycatalog:latest}
    pull_policy: if_not_present
    ports:
      - "${FLOECAT_UNITY_HOST_PORT:-8083}:8080"
    profiles:
      - unity
    networks:
      - floecat

networks:
  floecat:
    driver: bridge
