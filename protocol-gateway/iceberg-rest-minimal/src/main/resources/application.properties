quarkus.http.host=${FLOECAT_REST_HOST:0.0.0.0}
quarkus.http.port=${FLOECAT_REST_PORT:${ICEBERG_REST_PORT:9200}}
quarkus.http.test-port=${FLOECAT_REST_TEST_PORT:${ICEBERG_REST_TEST_PORT:9200}}
quarkus.grpc.server.use-separate-server=false
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=combined
quarkus.jackson.fail-on-unknown-properties=true
quarkus.banner.enabled=false
floecat.gateway.minimal.upstream-target=${FLOECAT_UPSTREAM_TARGET:localhost:9100}
floecat.gateway.minimal.upstream-plaintext=true
floecat.gateway.minimal.default-prefix=examples
floecat.gateway.minimal.default-account-id=${ICEBERG_DEFAULT_ACCOUNT:5eaa9cd5-7d08-3750-9457-cfe800b0b9d2}
floecat.gateway.minimal.default-authorization=${ICEBERG_DEFAULT_AUTH:Bearer token}
floecat.gateway.minimal.metadata-s3-endpoint=${FLOECAT_GATEWAY_STORAGE_CREDENTIAL_PROPERTIES_S3_ENDPOINT:${FLOECAT_STORAGE_AWS_S3_ENDPOINT:${AWS_ENDPOINT_URL:http://localstack:4566}}}
floecat.gateway.minimal.metadata-s3-path-style-access=${FLOECAT_GATEWAY_STORAGE_CREDENTIAL_PROPERTIES_S3_PATH_STYLE_ACCESS:${FLOECAT_STORAGE_AWS_S3_PATH_STYLE:${FLOECAT_STORAGE_S3_PATH_STYLE:true}}}
floecat.gateway.minimal.metadata-s3-region=${ICEBERG_STORAGE_REGION:${FLOECAT_STORAGE_AWS_REGION:${AWS_REGION:us-east-1}}}
floecat.gateway.minimal.metadata-client-region=${ICEBERG_STORAGE_REGION:${ICEBERG_DEFAULT_REGION:${FLOECAT_STORAGE_AWS_REGION:${AWS_REGION:us-east-1}}}}
floecat.gateway.minimal.metadata-s3-access-key-id=${ICEBERG_STORAGE_KEY_ID:${FLOECAT_STORAGE_AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:test}}}
floecat.gateway.minimal.metadata-s3-secret-access-key=${ICEBERG_STORAGE_SECRET:${FLOECAT_STORAGE_AWS_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:test}}}
floecat.gateway.minimal.default-warehouse-path=${ICEBERG_DEFAULT_WAREHOUSE:s3://floecat/}
floecat.gateway.minimal.log-request-bodies=${FLOECAT_MINIMAL_LOG_REQUEST_BODIES:false}
floecat.gateway.minimal.log-request-body-max-chars=${FLOECAT_MINIMAL_LOG_REQUEST_BODY_MAX_CHARS:8192}
